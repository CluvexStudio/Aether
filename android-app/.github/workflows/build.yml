name: Build Aether Dashboard APK

on:
  push:
    branches: [ "android-dashboard-app" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew

      - name: Build Debug APK
        working-directory: ./android-app
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android-app/app/build/outputs/apk/debug/app-debug.apk Aether-Dashboard.apk

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: dashboard-latest
          name: Aether Dashboard APK
          body: "Automated build of Aether WebApp."
          prerelease: false
          files: Aether-Dashboard.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
