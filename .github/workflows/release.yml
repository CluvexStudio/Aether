name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------
  # macOS + Windows desktop targets, always on the latest runners.
  # macOS uses macos-latest (Apple Silicon); the Intel/x86_64 binary
  # is cross-compiled from that same runner.
  # Windows uses windows-latest for x86_64. The arm64 MSVC target is not
  # built: boringtun pulls in ring 0.16.20, whose C build fails on
  # aarch64-pc-windows-msvc (BN_ULLONG undeclared in the bn/internal.h
  # fallback path), and few users run arm64 Windows anyway.
  # ------------------------------------------------------------------
  desktop:
    name: Build ${{ matrix.archive }} 
    runs-on: ${{ matrix.os }} 
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: aether-macos-arm64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: aether-macos-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: aether-windows-x86_64.zip
    defaults:
      run:
        working-directory: aether
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }} 

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install NASM
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} 

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.archive }}  aether

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/aether.exe,run-aether.bat -DestinationPath ${{ matrix.archive }} 

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }} 
          path: aether/${{ matrix.archive }} 
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Linux targets, built inside the latest Fedora container.
  # x86_64 builds on an x86_64 runner and arm64 on a native arm64
  # runner, both using fedora:latest so binaries link against a fresh
  # Fedora toolchain. Rust is installed via rustup to guarantee the
  # latest stable (>= 1.88 required by the crate).
  # ------------------------------------------------------------------
  linux:
    name: Build ${{ matrix.archive }} 
    runs-on: ${{ matrix.os }} 
    container:
      image: fedora:latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: aether-linux-x86_64.tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: aether-linux-arm64.tar.gz
    defaults:
      run:
        working-directory: aether
    steps:
      - name: Install system dependencies (Fedora)
        working-directory: /
        run: |
          dnf -y install \
            gcc gcc-c++ make cmake ninja-build golang nasm clang \
            perl perl-FindBin perl-IPC-Cmd \
            curl git tar gzip xz findutils which

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (latest stable via rustup)
        working-directory: /
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }} 

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} 

      - name: Package archive
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.archive }}  aether

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }} 
          path: aether/${{ matrix.archive }} 
          if-no-files-found: error

  # ------------------------------------------------------------------
  # 32-bit ARM (Raspberry Pi 2/3 class and older ARM boards).
  # Cross-compiled on the latest Ubuntu runner with the gnueabihf
  # toolchain, which ships the glibc hard-float cross compiler that
  # Fedora does not package cleanly. Best-effort, never blocks release.
  # ------------------------------------------------------------------
  linux-armv7:
    name: Build aether-linux-armv7.tar.gz
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aether
    env:
      CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
      CC_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc
      CXX_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-g++
      AR_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-ar
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-unknown-linux-gnueabihf

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install ARM cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Build release binary
        run: cargo build --release --target armv7-unknown-linux-gnueabihf

      - name: Package archive
        run: |
          cd target/armv7-unknown-linux-gnueabihf/release
          tar -czf ../../../aether-linux-armv7.tar.gz aether

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-linux-armv7.tar.gz
          path: aether/aether-linux-armv7.tar.gz
          if-no-files-found: error

  # ------------------------------------------------------------------
  # 32-bit ARM musl, fully static (OpenWrt routers and other musl-based
  # Linux systems). Built directly on the runner rather than with
  # `cross`/Docker: this repo isn't a single cargo workspace (aether
  # depends on ../quiche via path deps, and quiche has its own
  # [workspace]), and cross's container only mounts the crate being
  # built, so it can't see the referenced workspace root. Building on
  # the runner avoids that entirely.
  #
  # The musl toolchain comes from AmanoTeam/musl-gcc-cross's GitHub
  # release, not musl.cc, which blocks all requests from GitHub
  # Actions runners. Note the release asset is named by *host*
  # architecture, not target: x86_64-unknown-linux-gnu.tar.xz is the
  # x86_64-hosted toolchain that contains cross-compilers for every
  # target musl-gcc-cross supports, including armv7-musleabihf.
  #
  # boring-sys uses bindgen (backed by clang) to generate BoringSSL
  # bindings. Without BINDGEN_EXTRA_CLANG_ARGS pointing it at the musl
  # sysroot, clang falls back to the host's glibc headers, which don't
  # exist in the same layout musl expects (missing bits/libc-header-start.h).
  #
  # RUST_LIBC_UNSTABLE_MUSL_V1_2_3 tells the libc crate that this is a
  # modern musl (1.2.x, 64-bit time_t on 32-bit targets). Without it,
  # libc assumes the old 32-bit time_t, which doesn't match what
  # bindgen sees in the real (1.2.x) sysroot headers, and boring fails
  # to build with type mismatches on ASN1_TIME_set/X509_VERIFY_PARAM_set_time.
  # ------------------------------------------------------------------
  linux-armv7-musl:
    name: Build aether-linux-armv7-musl.tar.gz
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aether
    env:
      CARGO_TARGET_ARMV7_UNKNOWN_LINUX_MUSLEABIHF_LINKER: /opt/musl-cross/bin/armv7-unknown-linux-musleabihf-gcc
      CC_armv7_unknown_linux_musleabihf: /opt/musl-cross/bin/armv7-unknown-linux-musleabihf-gcc
      CXX_armv7_unknown_linux_musleabihf: /opt/musl-cross/bin/armv7-unknown-linux-musleabihf-g++
      AR_armv7_unknown_linux_musleabihf: /opt/musl-cross/bin/armv7-unknown-linux-musleabihf-ar
      BINDGEN_EXTRA_CLANG_ARGS_armv7_unknown_linux_musleabihf: --target=armv7-unknown-linux-musleabihf --sysroot=/opt/musl-cross/armv7-unknown-linux-musleabihf
      RUST_LIBC_UNSTABLE_MUSL_V1_2_3: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-unknown-linux-musleabihf

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install musl cross toolchain
        run: |
          curl -fsSL https://github.com/AmanoTeam/musl-gcc-cross/releases/download/gcc-15/x86_64-unknown-linux-gnu.tar.xz -o /tmp/musl-cross.tar.xz
          sudo mkdir -p /opt/musl-cross
          sudo tar -C /opt/musl-cross --strip-components=1 -xJf /tmp/musl-cross.tar.xz

      - name: Build release binary
        run: cargo build --release --target armv7-unknown-linux-musleabihf

      - name: Package archive
        run: |
          cd target/armv7-unknown-linux-musleabihf/release
          tar -czf ../../../aether-linux-armv7-musl.tar.gz aether

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-linux-armv7-musl.tar.gz
          path: aether/aether-linux-armv7-musl.tar.gz
          if-no-files-found: error

  # ------------------------------------------------------------------
  # 64-bit x86 and arm64 musl, fully static. x86_64 covers OpenWrt on
  # x86_64 routers/boxes and any generic musl-based x86_64 Linux.
  # aarch64 covers OpenWrt on arm64 routers and Raspberry Pi 4/5 running
  # a musl userland. Same toolchain source and same bindgen/libc env
  # var fixes as linux-armv7-musl above, just different target triples.
  # ------------------------------------------------------------------
  linux-musl:
    name: Build ${{ matrix.archive }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aether
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            cross_prefix: x86_64-unknown-linux-musl
            archive: aether-linux-x86_64-musl.tar.gz
          - target: aarch64-unknown-linux-musl
            cross_prefix: aarch64-unknown-linux-musl
            archive: aether-linux-aarch64-musl.tar.gz
    env:
      RUST_LIBC_UNSTABLE_MUSL_V1_2_3: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install musl cross toolchain
        run: |
          curl -fsSL https://github.com/AmanoTeam/musl-gcc-cross/releases/download/gcc-15/x86_64-unknown-linux-gnu.tar.xz -o /tmp/musl-cross.tar.xz
          sudo mkdir -p /opt/musl-cross
          sudo tar -C /opt/musl-cross --strip-components=1 -xJf /tmp/musl-cross.tar.xz

      - name: Set up cross env vars
        run: |
          triple=$(echo "${{ matrix.target }}" | tr '-' '_')
          prefix=/opt/musl-cross/bin/${{ matrix.cross_prefix }}
          echo "CARGO_TARGET_${triple^^}_LINKER=${prefix}-gcc" >> "$GITHUB_ENV"
          echo "CC_${triple}=${prefix}-gcc" >> "$GITHUB_ENV"
          echo "CXX_${triple}=${prefix}-g++" >> "$GITHUB_ENV"
          echo "AR_${triple}=${prefix}-ar" >> "$GITHUB_ENV"
          echo "BINDGEN_EXTRA_CLANG_ARGS_${triple}=--target=${{ matrix.target }} --sysroot=/opt/musl-cross/${{ matrix.cross_prefix }}" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.archive }} aether

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: aether/${{ matrix.archive }}
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Android / Termux targets, built with the NDK via cargo-ndk on the
  # latest Ubuntu runner (the NDK cross toolchain, not the host libc,
  # determines the output).
  # ------------------------------------------------------------------
  android:
    name: Build ${{ matrix.archive }} 
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            target: aarch64-linux-android
            archive: aether-android-arm64.tar.gz
          - abi: armeabi-v7a
            target: armv7-linux-androideabi
            archive: aether-android-armv7.tar.gz
          - abi: x86_64
            target: x86_64-linux-android
            archive: aether-android-x86_64.tar.gz
    defaults:
      run:
        working-directory: aether
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }} 

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build release binary
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }} 
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path }} 
        run: cargo ndk -t ${{ matrix.abi }}  --platform 24 build --release

      - name: Package archive
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.archive }}  aether

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }} 
          path: aether/${{ matrix.archive }} 
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Collect every artifact, generate SHA-256 checksums and publish.
  # Runs even if some build legs failed, so one broken target never
  # blocks shipping the ones that succeeded.
  # ------------------------------------------------------------------
  release:
    name: Publish release
    needs: [desktop, linux, linux-armv7, linux-armv7-musl, linux-musl, android]
    runs-on: ubuntu-latest
    if: ${{ always() }} && startsWith(github.ref, 'refs/tags/') 
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          shopt -s nullglob
          files=(*.tar.gz *.zip)
          for f in "${files[@]}"; do
            sha256sum "$f" > "$f.sha256"
          done
          sha256sum "${files[@]}" > SHA256SUMS.txt
          echo "----- SHA256SUMS.txt -----"
          cat SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: dist/**/*
          body: |
            Aether v1.4.0

            Aether is a user-space proxy client. It tunnels traffic out of a filtered network and exposes a local SOCKS5 proxy on 127.0.0.1:1819. Point a browser, terminal, or system proxy at that address and your traffic leaves through the tunnel.

            What's new in v1.4.0:

            - Security fix: MASQUE connections now verify the Cloudflare edge certificate against pinned SPKI hashes instead of skipping verification entirely. Before this, anyone able to intercept the connection could present a fake certificate and the client would accept it silently. Both the HTTP/3 and HTTP/2 transports are covered.
            - Fixed WireGuard and WARP-in-WARP (gool) reporting "connected" while the tunnel was actually dead. Both now run a continuous health check and reconnect automatically if no real data has come back from the peer for a while, instead of sitting there silently with a socks5 proxy that leads nowhere.
            - Fixed a memory/task leak in WireGuard, MASQUE HTTP/2, and MASQUE HTTP/3: every reconnect used to leave old background tasks running instead of shutting them down, so long-running sessions with frequent drops would slowly pile up idle tasks and memory.
            - gool (WARP-in-WARP) now reconnects automatically like the other two modes. Previously, if the outer tunnel dropped, the whole process just exited.
            - `--log-level` replaces the old all-or-nothing `--verbose`. Pick error, warn, info, debug or trace. info stays quiet, debug adds tunnel internals useful for troubleshooting, trace adds full per-packet detail. `--verbose` still works as a shortcut for debug.
            - Aether now reads the machine's CPU count and RAM at startup and scales scan concurrency, socket buffers, and internal queue sizes accordingly, so it doesn't hog resources on a router or a small board. Override with `--perf low|medium|high` if you want to force it.
            - New fully static builds for x86_64 and aarch64 musl, on top of the existing armv7 musl build. Covers OpenWrt on x86_64/arm64 boxes and Raspberry Pi 4/5 running a musl userland.

            This release includes prebuilt binaries for:

            - Linux x86_64, built on Fedora latest (aether-linux-x86_64.tar.gz)
            - Linux arm64 / aarch64, built on Fedora latest (aether-linux-arm64.tar.gz)
            - Linux armv7 / 32-bit ARM, e.g. Raspberry Pi 2/3 (aether-linux-armv7.tar.gz)
            - Linux armv7 musl / 32-bit ARM, fully static, for OpenWrt routers and other musl-based systems (aether-linux-armv7-musl.tar.gz)
            - Linux x86_64 musl, fully static, for OpenWrt and other musl-based x86_64 systems (aether-linux-x86_64-musl.tar.gz)
            - Linux aarch64 musl, fully static, for OpenWrt arm64 and Raspberry Pi 4/5 (aether-linux-aarch64-musl.tar.gz)
            - macOS arm64 / Apple Silicon (aether-macos-arm64.tar.gz)
            - macOS x86_64 / Intel (aether-macos-x86_64.tar.gz)
            - Windows x86_64 (aether-windows-x86_64.zip)
            - Android / Termux arm64 (aether-android-arm64.tar.gz)
            - Android / Termux armv7 (aether-android-armv7.tar.gz)
            - Android / Termux x86_64 (aether-android-x86_64.tar.gz)

            Each archive ships with a matching .sha256 file, and a combined SHA256SUMS.txt lists every checksum.

            Quick start (Termux, one-line install):

               curl -fsSL https://raw.githubusercontent.com/CluvexStudio/aether/main/aether.sh -o aether.sh && chmod +x aether.sh && ./aether.sh install

            Quick start (Windows):

            1. Download aether-windows-x86_64.zip and extract it.
            2. Double-click run-aether.bat. It opens a terminal, runs aether.exe, and stays open afterwards so you can read any errors.

            Quick start (other platforms):

            1. Download the archive for your platform and extract it.
            2. Run the binary and answer the prompts, or set the environment variables listed in the guides.
            3. Point your client at socks5h://127.0.0.1:1819 and verify with:
               curl -x socks5h://127.0.0.1:1819 https://www.cloudflare.com/cdn-cgi/trace

            Verify a download (Linux/macOS):
               sha256sum -c aether-linux-x86_64.tar.gz.sha256

            See README.md and the Docs directory for transport selection, obfuscation profiles, the HTTP/2 vs HTTP/3 choice in MASQUE, and the full environment-variable reference.

  # ------------------------------------------------------------------
  # Build and push the Docker image to GitHub Container Registry (GHCR)
  # ------------------------------------------------------------------
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker requires repository names to be strictly lowercase.
      # Since CluvexStudio contains uppercase, we lowercase it here.
      - name: Downcase repository name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
